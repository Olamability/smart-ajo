name: Scheduled Jobs

on:
  schedule:
    # Run penalty processing every day at 02:00 UTC
    - cron: '0 2 * * *'
    # Run payout processing every day at 03:00 UTC
    - cron: '0 3 * * *'
    # Run contribution reminders every day at 08:00 UTC
    - cron: '0 8 * * *'
  # Allow manual triggers for testing
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - penalty-process
          - payout-process
          - contribution-reminders

jobs:
  penalty-process:
    name: Process Penalties
    runs-on: ubuntu-latest
    permissions: {}
    if: >
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'penalty-process' || github.event.inputs.job == 'all')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 2'))
    steps:
      - name: Invoke penalty-process Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/functions/v1/penalty-process" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::penalty-process failed with status $HTTP_STATUS"
            exit 1
          fi

  payout-process:
    name: Process Payouts
    runs-on: ubuntu-latest
    permissions: {}
    if: >
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'payout-process' || github.event.inputs.job == 'all')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 3'))
    steps:
      - name: Invoke payout-process Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/functions/v1/payout-process" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::payout-process failed with status $HTTP_STATUS"
            exit 1
          fi

  contribution-reminders:
    name: Send Contribution Reminders
    runs-on: ubuntu-latest
    permissions: {}
    if: >
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'contribution-reminders' || github.event.inputs.job == 'all')) ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 8'))
    steps:
      - name: Invoke contribution-reminders via Supabase RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/mark_overdue_contributions" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          # 404 just means the function is not yet defined – treat as non-fatal
          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::error::contribution-reminders failed with status $HTTP_STATUS"
            exit 1
          fi

  purge-rate-limit-buckets:
    name: Purge Expired Rate Limit Buckets
    runs-on: ubuntu-latest
    permissions: {}
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 2')
    steps:
      - name: Call purge function via Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s \
            -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/purge_expired_rate_limit_buckets" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
